name: Soundcloud
slug: soundcloud
type: plugin
version: 0.1.0
description: Soundcloud is a plugin that converts markdown lnks into the Soundcloud Universal Embed Code.
icon: plug
author:
  name: Susanna Fort
  email: info@susannafort.cat
homepage: https://github.com/susanna-fort/grav-plugin-soundcloud
demo: http://demo.yoursite.com
keywords: grav, plugin, etc
bugs: https://github.com/susanna-fort/grav-plugin-soundcloud/issues
docs: https://github.com/susanna-fort/grav-plugin-soundcloud/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
    text_var:
      type: text
      label: PLUGIN_SOUNDCLOUD.TEXT_VARIABLE
      help: PLUGIN_SOUNDCLOUD.TEXT_VARIABLE_HELP
