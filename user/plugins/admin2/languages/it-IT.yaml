        TWIG_SANDBOX_ALLOWED_PROPERTIES: 'Proprietà consentite'
        TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP: 'Elenchi per classe di proprietà di oggetti che il contenuto della pagina può leggere.'
        TWIG_SANDBOX_ALLOWED_TAGS: 'Tag consentiti'
        TWIG_SANDBOX_ALLOWED_TAGS_HELP: 'Tag Twig che il contenuto della pagina può utilizzare. Aggiungi solo tag i cui effetti vuoi esporre agli autori.'
        TWIG_SANDBOX_CLASS: Classe
        TWIG_SANDBOX_ENABLED: 'Abilita sandbox Twig'
        TWIG_SANDBOX_ENABLED_HELP: "Renderizza il contenuto della pagina scritto da editor all'interno di una SecurityPolicy Twig basata su allowlist. <strong>La disabilitazione rimuove l'unica protezione contro gli attacchi da injection di template tramite il contenuto della pagina</strong>: qualsiasi account con accesso a livello di editor (o chiunque comprometta il file system) può eseguire PHP arbitrario tramite Twig. Disabilita solo se un sito ha genuinamente bisogno di accesso al container dal contenuto della pagina e ti fidi pienamente di ogni autore."
        TWIG_SANDBOX_HELP: 'Allowlist di tag Twig, filtri, funzioni, metodi e proprietà che i template del contenuto della pagina possono utilizzare. Il contenuto scritto da editor viene renderizzato attraverso questa sandbox in modo che un autore compromesso o un bug da injection di template non possa accedere al container più ampio.'
        TWIG_SANDBOX_LOGGING: 'Registra violazioni'
