        TWIG_3_COMPATIBILITY_HELP: 'Abilita riscritture automatiche per la sintassi legacy Twig 1/2 che causa problemi su Twig 3 (es. <code>for ... if ...</code> guards).'
        TWIG_CACHING: 'Cache Twig'
        TWIG_CACHING_HELP: 'Controlla il meccanismo di caching Twig. Lascia questa opzione abilitata per le migliori prestazioni.'
        TWIG_CONTENT: 'Twig nei contenuti'
        TWIG_CONTENT_CONFIG_ACCESS: 'Consenti accesso alle variabili di configurazione in Twig'
        TWIG_CONTENT_CONFIG_ACCESS_HELP: 'Indica se la variabile Twig <code>config</code> è leggibile dal contenuto della pagina. Se disabilitato (predefinito), la lettura di <code>config.system.title</code> da una pagina non restituisce nulla. Se abilitato, <code>config</code> è esposto ma comunque filtrato da <code>config_denied_paths</code> (vedi Twig Sandbox di seguito) affinché le credenziali e altri sottoalberi sensibili rimangano nascosti.'
        TWIG_CONTENT_EDITOR_ENABLED: 'Consenti agli editor di attivare/disattivare Twig nei contenuti'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: "Se disabilitato (predefinito), la casella di controllo Twig nella scheda Avanzate dell'editor di pagina è visibile solo agli utenti cui è concessa l'autorizzazione <code>admin.pages_twig</code>, e le pagine che hanno già Twig abilitato possono essere modificate solo da questi utenti. Se abilitato, chiunque abbia accesso alla modifica della pagina può attivare/disattivare Twig su singole pagine."
        TWIG_CONTENT_HELP: 'Controlli per Twig incorporato in pagine scritte da editor. I template del tema su disco non sono influenzati da queste impostazioni; si applicano solo a Twig che gli autori inseriscono nel corpo della pagina o nel frontmatter.'
        TWIG_CONTENT_PROCESS_ENABLED: 'Abilita Twig nei contenuti'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: "Consenti alle pagine con <code>process: twig: true</code> nel loro frontmatter (e l'opt-in a livello di sito <code>system.pages.frontmatter.process_twig</code>) di eseguire effettivamente Twig. <strong>Disabilitato per impostazione predefinita in Grav 2.0.</strong> Lasciando questo disabilitato si riduce la superficie di attacco da injection di template, ma interrompe qualsiasi pagina che necessita di Twig nel suo corpo."
        TWIG_DEBUG: 'Debug Twig'
        TWIG_DEBUG_HELP: "Permette l'opzione di non caricare l'estensione Twig Debugger"
        TWIG_FIRST: 'Elabora Twig per primo'
        TWIG_FIRST_HELP: "Se hai abilitato l'elaborazione Twig delle pagine, puoi configurare Twig per elaborare prima o dopo markdown"
        TWIG_SANDBOX: 'Sandbox Twig'
        TWIG_SANDBOX_ADMIN_HINT: "Commento di suggerimento dell'amministratore"
        TWIG_SANDBOX_ADMIN_HINT_HELP: "Quando la sandbox blocca un'espressione, aggiungi un commento HTML su una sola riga alla pagina renderizzata in modo che i super-amministratori che visualizzano il sorgente vedano che qualcosa è stato filtrato. I visitatori e i non amministratori non vedono nulla."
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Filtri consentiti'
        TWIG_SANDBOX_ALLOWED_FILTERS_HELP: 'Filtri Twig che il contenuto della pagina può applicare.'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS: 'Funzioni consentite'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP: 'Funzioni Twig che il contenuto della pagina può chiamare.'
