        TWIG_SANDBOX_ADMIN_HINT_HELP: 'Cuando el sandbox bloquea una expresión, añade un comentario HTML de una línea a la página renderizada para que los super-administradores que vean el código fuente noten que algo fue filtrado. Los visitantes y administradores no-super ven nada.'
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Filtros permitidos'
