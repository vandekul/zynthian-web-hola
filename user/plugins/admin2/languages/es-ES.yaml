        TWIG_SANDBOX_CLASS: Clase
        TWIG_SANDBOX_ENABLED: 'Habilitar sandbox de Twig'
        TWIG_SANDBOX_ENABLED_HELP: 'Renderiza contenido de página creado por editores dentro de una SecurityPolicy de Twig basada en lista de permitidos. <strong>Deshabilitar elimina la única protección contra ataques de inyección de plantillas a través del contenido de la página</strong>: cualquier cuenta con acceso de nivel de editor (o cualquiera que comprometa el sistema de archivos) puede ejecutar PHP arbitrario a través de Twig. Solo desactive si un sitio realmente necesita acceso a contenedores desde contenido de página y confía completamente en cada autor.'
        TWIG_SANDBOX_HELP: 'Lista de permitidos de etiquetas Twig, filtros, funciones, métodos y propiedades que las plantillas de contenido de página pueden usar. El contenido creado por editores se renderiza a través de este sandbox para que un autor comprometido o un bug de inyección de plantillas no pueda alcanzar el contenedor más amplio.'
