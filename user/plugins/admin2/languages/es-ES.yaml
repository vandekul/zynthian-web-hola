        TWIG_CACHING_HELP: 'Controle el mecanismo de almacenamiento en caché de Twig. Mantenga esto habilitado para mejor rendimiento.'
        TWIG_CONTENT: 'Twig en contenido'
        TWIG_CONTENT_CONFIG_ACCESS: 'Permitir acceso a variables de configuración en Twig'
        TWIG_CONTENT_CONFIG_ACCESS_HELP: 'Si la variable <code>config</code> de Twig es legible desde el contenido de la página. Cuando está deshabilitado (predeterminado), leer <code>config.system.title</code> desde una página no devuelve nada. Cuando está habilitado, <code>config</code> está expuesto pero aún filtrado por <code>config_denied_paths</code> (véase Zona de seguridad de Twig más abajo) para que las credenciales y otros árboles sensibles permanezcan ocultos.'
        TWIG_CONTENT_EDITOR_ENABLED: 'Permitir que los editores cambien Twig en contenido'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: 'Cuando está deshabilitado (predeterminado), la casilla Twig en la pestaña Avanzado del editor de página solo es visible para usuarios con permiso <code>admin.pages_twig</code>, y las páginas que ya tienen Twig habilitado solo pueden ser editadas por esos usuarios. Cuando está habilitado, cualquiera con acceso de edición de páginas puede cambiar Twig en páginas individuales.'
        TWIG_CONTENT_HELP: 'Controles para Twig incrustado en contenido de página creado por editores. Las plantillas de tema en disco no se ven afectadas por esta configuración; solo se aplican a Twig que los autores colocan en cuerpos de página o frontmatter.'
        TWIG_CONTENT_PROCESS_ENABLED: 'Habilitar Twig en Contenido'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: 'Permitir que las páginas con <code>process: twig: true</code> en su frontmatter (y la opción de inclusión en todo el sitio <code>system.pages.frontmatter.process_twig</code>) ejecuten realmente Twig. <strong>Deshabilitado por defecto en Grav 2.0.</strong> Dejar esto deshabilitado reduce la superficie de ataque de inyección de plantillas, pero rompe cualquier página que necesite Twig en su cuerpo.'
        TWIG_DEBUG: 'Debug de Twig'
        TWIG_DEBUG_HELP: 'Permite la opción de no cargar la extensión Twig Debugger'
        TWIG_FIRST: 'Procesar Twig Primero'
        TWIG_FIRST_HELP: 'Si habilitó el procesamiento de página Twig, puede configurar Twig para procesar antes o después de markdown'
