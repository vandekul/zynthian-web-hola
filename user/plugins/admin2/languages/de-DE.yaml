        TWIG_CACHING_HELP: 'Steuert den Twig-Caching-Mechanismus. Lassen Sie diese Option aktiviert für beste Leistung.'
        TWIG_CONTENT: 'Twig in Inhalten'
        TWIG_CONTENT_CONFIG_ACCESS: 'Zugriff auf Konfigurationsvariablen in Twig ermöglichen'
        TWIG_CONTENT_CONFIG_ACCESS_HELP: 'Gibt an, ob die <code>config</code>-Twig-Variable aus dem Seiteninhalt lesbar ist. Wenn deaktiviert (Standard), gibt das Lesen von <code>config.system.title</code> von einer Seite nichts zurück. Wenn aktiviert, wird <code>config</code> verfügbar gemacht, aber immer noch durch <code>config_denied_paths</code> gefiltert (siehe Twig-Sandbox unten), sodass Anmeldedaten und andere sensible Teile verborgen bleiben.'
        TWIG_CONTENT_EDITOR_ENABLED: 'Editoren erlauben, Twig in Inhalten umzuschalten'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: 'Wenn deaktiviert (Standard), ist das Twig-Kontrollkästchen im Reiter „Erweitert" des Seiten-Editors nur für Benutzer sichtbar, denen die Berechtigung <code>admin.pages_twig</code> gewährt wurde, und Seiten, die bereits Twig aktiviert haben, können nur von diesen Benutzern bearbeitet werden. Wenn aktiviert, kann jeder Benutzer mit Seiten-Bearbeitungszugriff Twig auf einzelnen Seiten umschalten.'
        TWIG_CONTENT_HELP: 'Steuerelemente für von Redakteuren verfasste Twig-Dateien, die in Seiteninhalt eingebettet sind. Design-Templates auf der Festplatte werden durch diese Einstellungen nicht beeinflusst; sie gelten nur für Twig-Code, den Autoren in Seitentexte oder Frontmatter einfügen.'
        TWIG_CONTENT_PROCESS_ENABLED: 'Twig in Inhalt aktivieren'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: 'Ermöglichen Sie Seiten mit <code>process: twig: true</code> in ihrem Frontmatter (und dem siteweiten <code>system.pages.frontmatter.process_twig</code> Opt-in), um Twig tatsächlich auszuführen. <strong>In Grav 2.0 standardmäßig deaktiviert.</strong> Wenn diese Option deaktiviert bleibt, wird die Angriffsfläche für Template-Injection-Attacken verringert, aber es können Seiten nicht mehr funktionieren, die Twig in ihrem Text benötigen.'
        TWIG_DEBUG: Twig-Debugger
        TWIG_DEBUG_HELP: 'Ermöglicht die Möglichkeit, die Twig Debugger-Erweiterung nicht zu laden'
        TWIG_FIRST: 'Twig zuerst verarbeiten'
        TWIG_FIRST_HELP: 'Wenn Sie die Twig-Seitenverarbeitung aktiviert haben, können Sie Twig so konfigurieren, dass es vor oder nach Markdown verarbeitet wird'
        TWIG_SANDBOX: Twig-Sandbox
        TWIG_SANDBOX_ADMIN_HINT: Admin-Hinweis-Kommentar
        TWIG_SANDBOX_ADMIN_HINT_HELP: 'Wenn die Sandbox einen Ausdruck blockiert, wird ein einzeiliger HTML-Kommentar an die gerендerte Seite angehängt, damit Super-Administratoren beim Anschauen des Quellcodes sehen, dass etwas gefiltert wurde. Besucher und andere Administratoren sehen nichts.'
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Zulässige Filter'
        TWIG_SANDBOX_ALLOWED_FILTERS_HELP: 'Twig-Filter, die Seiteninhalt anwenden darf.'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS: 'Zulässige Funktionen'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP: 'Twig-Funktionen, die Seiteninhalt aufrufen darf.'
        TWIG_SANDBOX_ALLOWED_METHODS: 'Zulässige Methoden'
        TWIG_SANDBOX_ALLOWED_METHODS_HELP: 'Pro-Klasse-Listen von Objektmethoden, die Seiteninhalt aufrufen darf.'
        TWIG_SANDBOX_ALLOWED_PROPERTIES: 'Zulässige Eigenschaften'
        TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP: 'Pro-Klasse-Listen von Objekteigenschaften, die Seiteninhalt lesen darf.'
        TWIG_SANDBOX_ALLOWED_TAGS: 'Zulässige Tags'
        TWIG_SANDBOX_ALLOWED_TAGS_HELP: 'Twig-Tags, die Seiteninhalt verwenden darf. Fügen Sie nur Tags hinzu, deren Effekte Sie Autoren zugänglich machen möchten.'
        TWIG_SANDBOX_CLASS: Klasse
        TWIG_SANDBOX_ENABLED: 'Twig-Sandbox aktivieren'
        TWIG_SANDBOX_ENABLED_HELP: 'Rendert von Redakteuren verfassten Seiteninhalt in einer auf einer Zulassungsliste basierenden Twig SecurityPolicy. <strong>Wenn Sie diese deaktivieren, entfernen Sie den einzigen Schutz gegen Template-Injection-Attacken über Seiteninhalt</strong>: Jedes Konto mit Editor-Zugriff (oder jeder, der das Dateisystem kompromittiert) kann willkürlichen PHP-Code über Twig ausführen. Deaktivieren Sie dies nur, wenn eine Website wirklich Container-Zugriff aus Seiteninhalt benötigt und Sie jedem Autor vollständig vertrauen.'
        TWIG_SANDBOX_HELP: 'Zulassungsliste von Twig-Tags, -Filtern, -Funktionen, -Methoden und -Eigenschaften, die von Seiteninhalts-Templates verwendet werden dürfen. Von Redakteuren verfasster Inhalt wird durch diese Sandbox gerendert, damit eine kompromittierte Autorin oder ein Template-Injection-Bug nicht in den breiteren Container gelangen kann.'
        TWIG_SANDBOX_LOGGING: 'Verstöße protokollieren'
        TWIG_SANDBOX_LOGGING_HELP: 'Jeder blockierte Ausdruck wird in <code>logs/twig-sandbox.log</code> geschrieben. Nützlich beim Abstimmen der Allowlist; in der Produktion ausschalten, um die Protokolle sauber zu halten.'
