        TWIG_3_COMPATIBILITY_HELP: 'Activer les réécritures automatiques pour la syntaxe héritée Twig 1/2 qui ne fonctionne plus avec Twig 3 (par ex. <code>for ... if ...</code> gardes).'
        TWIG_CACHING: 'Mise en cache Twig'
        TWIG_CACHING_HELP: 'Contrôler le mécanisme de mise en cache de Twig. Laissez ceci activé pour les meilleures performances.'
        TWIG_CONTENT: 'Twig dans le contenu'
        TWIG_CONTENT_CONFIG_ACCESS: "Autoriser l'accès aux variables de configuration dans Twig"
        TWIG_CONTENT_CONFIG_ACCESS_HELP: "Indique si la variable Twig <code>config</code> est lisible à partir du contenu de la page. Lorsque désactivée (par défaut), la lecture de <code>config.system.title</code> à partir d'une page ne retourne rien. Lorsqu'activée, <code>config</code> est exposée mais toujours filtrée par <code>config_denied_paths</code> (voir Bac à sable Twig ci-dessous) afin que les identifiants et autres sous-arborescences sensibles restent cachés."
        TWIG_CONTENT_EDITOR_ENABLED: 'Permettre aux éditeurs de basculer Twig dans le contenu'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: "Lorsque désactivée (par défaut), la case Twig de l'onglet Avancé de l'éditeur de page n'est visible que pour les utilisateurs ayant la permission <code>admin.pages_twig</code>, et les pages ayant déjà Twig activé ne peuvent être modifiées que par ces utilisateurs. Lorsqu'activée, tout utilisateur ayant accès à la modification de pages peut basculer Twig sur des pages individuelles."
        TWIG_CONTENT_HELP: "Contrôles pour Twig intégré dans le contenu des pages créées par l'éditeur. Les modèles de thème sur le disque ne sont pas affectés par ces paramètres ; ils s'appliquent uniquement à Twig que les auteurs mettent dans les corps de pages ou dans le frontmatter."
        TWIG_CONTENT_PROCESS_ENABLED: 'Activer Twig dans le contenu'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: "Autoriser les pages avec <code>process: twig: true</code> dans leur frontmatter (et l'opt-in au niveau du site <code>system.pages.frontmatter.process_twig</code>) à exécuter réellement Twig. <strong>Désactivé par défaut dans Grav 2.0.</strong> Le laisser désactivé réduit la surface d'attaque par injection de modèles, mais casse toute page qui a besoin de Twig dans son corps."
        TWIG_DEBUG: 'Débogage Twig'
        TWIG_DEBUG_HELP: "Permet l'option de ne pas charger l'extension Twig Debugger"
        TWIG_FIRST: 'Traiter Twig en premier'
        TWIG_FIRST_HELP: 'Si vous avez activé le traitement des pages Twig, vous pouvez configurer Twig pour traiter avant ou après markdown'
        TWIG_SANDBOX: 'Bac à sable Twig'
        TWIG_SANDBOX_ADMIN_HINT: "Commentaire d'indication pour les administrateurs"
        TWIG_SANDBOX_ADMIN_HINT_HELP: 'Lorsque le bac à sable bloque une expression, ajoutez un commentaire HTML sur une seule ligne à la page rendue afin que les super-administrateurs qui visionnent la source voient que quelque chose a été filtré. Les visiteurs et les non-administrateurs ne voient rien.'
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Filtres autorisés'
        TWIG_SANDBOX_ALLOWED_FILTERS_HELP: 'Filtres Twig que le contenu de la page peut appliquer.'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS: 'Fonctions autorisées'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP: 'Fonctions Twig que le contenu de la page peut appeler.'
        TWIG_SANDBOX_ALLOWED_METHODS: 'Méthodes autorisées'
        TWIG_SANDBOX_ALLOWED_METHODS_HELP: "Listes par classe des méthodes d'objet que le contenu de la page peut invoquer."
        TWIG_SANDBOX_ALLOWED_PROPERTIES: 'Propriétés autorisées'
        TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP: "Listes par classe des propriétés d'objet que le contenu de la page peut lire."
        TWIG_SANDBOX_ALLOWED_TAGS: 'Étiquettes autorisées'
        TWIG_SANDBOX_ALLOWED_TAGS_HELP: 'Balises Twig que le contenu de la page peut utiliser. Ajoutez uniquement les balises dont vous voulez que les effets soient exposés aux auteurs.'
        TWIG_SANDBOX_CLASS: Classe
        TWIG_SANDBOX_ENABLED: 'Activer le bac à sable Twig'
        TWIG_SANDBOX_ENABLED_HELP: "Rend le contenu de la page créé par l'éditeur à l'intérieur d'une SecurityPolicy Twig basée sur une liste d'autorisation. <strong>La désactiver supprime la seule protection contre les attaques par injection de modèles via le contenu de la page</strong> : tout compte avec accès au niveau éditeur (ou quiconque compromet le système de fichiers) peut exécuter du PHP arbitraire via Twig. Désactivez-la uniquement si un site a réellement besoin d'accès au conteneur à partir du contenu de la page et que vous avez pleine confiance en chaque auteur."
        TWIG_SANDBOX_HELP: "Liste d'autorisation des balises, filtres, fonctions, méthodes et propriétés Twig que les modèles de contenu de page peuvent utiliser. Le contenu créé par l'éditeur est rendu via ce bac à sable de sorte qu'un auteur compromis ou un bogue d'injection de modèles ne peut pas accéder au conteneur plus large."
        TWIG_SANDBOX_LOGGING: 'Violations du journal'
        TWIG_SANDBOX_LOGGING_HELP: 'Écrire chaque expression bloquée dans <code>logs/twig-sandbox.log</code>. Utile lors du réglage de la liste blanche; désactiver en production pour maintenir les journaux silencieux.'
