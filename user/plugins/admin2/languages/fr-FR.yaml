        TWIG_3_COMPATIBILITY_HELP: 'Activer les réécritures automatiques pour la syntaxe héritée Twig 1/2 qui ne fonctionne pas avec Twig 3 (par exemple <code>for ... if ...</code> guards).'
        TWIG_CACHING: 'Mise en cache Twig'
        TWIG_CACHING_HELP: 'Contrôlez le mécanisme de mise en cache Twig. Laissez cette option activée pour des performances optimales.'
        TWIG_CONTENT: 'Twig dans le contenu'
        TWIG_CONTENT_CONFIG_ACCESS: "Autoriser l'accès aux variables de configuration dans Twig"
        TWIG_CONTENT_CONFIG_ACCESS_HELP: "Indique si la variable Twig <code>config</code> est accessible depuis le contenu des pages. Lorsqu'elle est désactivée (par défaut), la lecture de <code>config.system.title</code> à partir d'une page ne retourne rien. Lorsqu'elle est activée, <code>config</code> est exposée mais toujours filtrée par <code>config_denied_paths</code> (voir Twig Sandbox ci-dessous) afin que les identifiants et autres sous-arbres sensibles restent masqués."
        TWIG_CONTENT_EDITOR_ENABLED: 'Autoriser les éditeurs à basculer Twig dans le contenu'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: "Lorsqu'elle est désactivée (par défaut), la case Twig dans l'onglet Avancé de l'éditeur de pages n'est visible que pour les utilisateurs disposant de la permission <code>admin.pages_twig</code>, et les pages où Twig est déjà activé ne peuvent être modifiées que par ces utilisateurs. Lorsqu'elle est activée, tout utilisateur disposant d'un accès à la modification de pages peut activer ou désactiver Twig sur des pages individuelles."
        TWIG_CONTENT_HELP: "Contrôles pour Twig intégré dans le contenu des pages rédigées par des éditeurs. Les modèles de thème sur disque ne sont pas affectés par ces paramètres ; ils s'appliquent uniquement à Twig que les auteurs placent dans les corps de page ou le frontmatter."
        TWIG_CONTENT_PROCESS_ENABLED: 'Activer Twig dans le contenu'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: "Autorisez les pages avec <code>process: twig: true</code> dans leur frontmatter (et l'activation du site <code>system.pages.frontmatter.process_twig</code>) à exécuter réellement Twig. <strong>Désactivé par défaut dans Grav 2.0.</strong> Laisser ceci désactivé réduit la surface d'attaque par injection de modèle, mais casse toute page qui a besoin de Twig dans son corps."
        TWIG_DEBUG: 'Débogage Twig'
        TWIG_DEBUG_HELP: "Permet l'option de ne pas charger l'extension Twig Debugger"
        TWIG_FIRST: 'Traiter Twig en premier'
        TWIG_FIRST_HELP: "Si vous avez activé le traitement des pages Twig, vous pouvez configurer Twig pour qu'il se traite avant ou après le markdown"
        TWIG_SANDBOX: 'Sandbox Twig'
        TWIG_SANDBOX_ADMIN_HINT: "Commentaire d'indice d'administration"
        TWIG_SANDBOX_ADMIN_HINT_HELP: "Lorsque le sandbox bloque une expression, ajoutez un commentaire HTML d'une ligne à la page rendue pour que les super-administrateurs qui consultent la source voient que quelque chose a été filtré. Les visiteurs et les non-administrateurs ne voient rien."
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Filtres autorisés'
        TWIG_SANDBOX_ALLOWED_FILTERS_HELP: 'Filtres Twig que le contenu de la page peut appliquer.'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS: 'Fonctions autorisées'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP: 'Fonctions Twig que le contenu de la page peut appeler.'
        TWIG_SANDBOX_ALLOWED_METHODS: 'Méthodes autorisées'
        TWIG_SANDBOX_ALLOWED_METHODS_HELP: "Listes par classe de méthodes d'objet que le contenu de la page peut invoquer."
        TWIG_SANDBOX_ALLOWED_PROPERTIES: 'Propriétés autorisées'
        TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP: "Listes par classe de propriétés d'objet que le contenu de la page peut lire."
        TWIG_SANDBOX_ALLOWED_TAGS: 'Balises autorisées'
        TWIG_SANDBOX_ALLOWED_TAGS_HELP: 'Balises Twig que le contenu de la page peut utiliser. Ajoutez uniquement les balises dont vous voulez que les effets soient exposés aux auteurs.'
        TWIG_SANDBOX_CLASS: Classe
        TWIG_SANDBOX_ENABLED: 'Activer le sandbox Twig'
        TWIG_SANDBOX_ENABLED_HELP: "Rend le contenu de la page rédigé par un éditeur à l'intérieur d'une SecurityPolicy Twig basée sur une liste blanche. <strong>La désactivation supprime la seule protection contre les attaques par injection de modèle via le contenu de la page</strong> : tout compte ayant un accès au niveau éditeur (ou quiconque compromet le système de fichiers) peut exécuter du PHP arbitraire via Twig. Désactivez-la uniquement si un site a réellement besoin d'un accès conteneur à partir du contenu de la page et que vous faites entièrement confiance à chaque auteur."
        TWIG_SANDBOX_HELP: "Liste blanche de balises Twig, filtres, fonctions, méthodes et propriétés que les modèles de contenu de page peuvent utiliser. Le contenu rédigé par un éditeur est rendu via ce sandbox pour qu'un auteur compromis ou un bogue d'injection de modèle ne puisse pas accéder au conteneur plus large."
        TWIG_SANDBOX_LOGGING: 'Enregistrer les violations'
        TWIG_SANDBOX_LOGGING_HELP: "Écrivez chaque expression bloquée dans <code>logs/twig-sandbox.log</code>. Utile lors de la mise au point de la liste d'autorisation ; désactivez en production pour maintenir les logs silencieux."
