        TWIG_SANDBOX_ENABLED: 'Habilitar sandbox do Twig'
        TWIG_SANDBOX_ENABLED_HELP: 'Renderiza o conteúdo da página criado pelo editor dentro de uma SecurityPolicy do Twig baseada em lista de permissões. <strong>Desativar isso remove a única proteção contra ataques de injeção de modelo via conteúdo de página</strong>: qualquer conta com acesso de nível de editor (ou qualquer pessoa que comprometa o sistema de arquivos) pode executar PHP arbitrário via Twig. Desative apenas se um site realmente precisar de acesso ao container a partir do conteúdo da página e você confiar totalmente em todos os autores.'
