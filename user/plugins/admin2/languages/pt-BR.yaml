        TWIG_CONTENT_PROCESS_ENABLED_HELP: 'Permite que páginas com <code>process: twig: true</code> em seu frontmatter (e a opção <code>system.pages.frontmatter.process_twig</code> habilitada globalmente) executem o Twig. <strong>Desativado por padrão no Grav 2.0.</strong> Manter isso desabilitado reduz a superfície de ataque de injeção de templates, mas interrompe qualquer página que precise de Twig em seu corpo.'
