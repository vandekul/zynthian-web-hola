        TWIG_3_COMPATIBILITY_HELP: 'Habilitar reescrituras automáticas de sintaxis heredada de Twig 1/2 que genera errores en Twig 3 (por ejemplo, <code>for ... if ...</code> guards).'
        TWIG_CACHING: 'Almacenamiento en caché de Twig'
        TWIG_CACHING_HELP: 'Controla el mecanismo de almacenamiento en caché de Twig. Mantén esto habilitado para un mejor rendimiento.'
        TWIG_CONTENT: 'Twig en contenido'
        TWIG_CONTENT_CONFIG_ACCESS: 'Permitir acceso a variables de configuración en Twig'
        TWIG_CONTENT_CONFIG_ACCESS_HELP: 'Si la variable Twig <code>config</code> es legible desde el contenido de la página. Cuando está deshabilitado (predeterminado), leer <code>config.system.title</code> desde una página no devuelve nada. Cuando está habilitado, <code>config</code> se expone pero aún se filtra por <code>config_denied_paths</code> (consulta «Caja de seguridad de Twig» a continuación) para que las credenciales y otros subárboles sensibles permanezcan ocultos.'
        TWIG_CONTENT_EDITOR_ENABLED: 'Permitir que los editores activen o desactiven Twig en contenido'
        TWIG_CONTENT_EDITOR_ENABLED_HELP: 'Cuando está deshabilitado (predeterminado), la casilla de verificación de Twig en la pestaña Avanzado del editor de páginas solo es visible para usuarios con permiso <code>admin.pages_twig</code>, y las páginas que ya tienen Twig habilitado solo pueden ser editadas por esos usuarios. Cuando está habilitado, cualquiera con acceso de edición de páginas puede activar o desactivar Twig en páginas individuales.'
        TWIG_CONTENT_HELP: 'Controles para Twig incrustado en contenido de página creado por editores. Las plantillas de temas en disco no se ven afectadas por esta configuración; solo se aplican a Twig que los autores ponen en cuerpos de página o frontmatter.'
        TWIG_CONTENT_PROCESS_ENABLED: 'Habilitar Twig en Contenido'
        TWIG_CONTENT_PROCESS_ENABLED_HELP: 'Permitir que las páginas con <code>process: twig: true</code> en su frontmatter (y la opción de participación en todo el sitio <code>system.pages.frontmatter.process_twig</code>) ejecuten realmente Twig. <strong>Deshabilitado por defecto en Grav 2.0.</strong> Dejar esto deshabilitado reduce la superficie de ataque de inyección de plantillas, pero rompe cualquier página que necesite Twig en su cuerpo.'
        TWIG_DEBUG: 'Depuración de Twig'
        TWIG_DEBUG_HELP: 'Permite la opción de no cargar la extensión Twig Debugger'
        TWIG_FIRST: 'Procesar Twig Primero'
        TWIG_FIRST_HELP: 'Si habilitaste el procesamiento de páginas Twig, puedes configurar Twig para procesar antes o después de markdown'
        TWIG_SANDBOX: 'Sandbox de Twig'
        TWIG_SANDBOX_ADMIN_HINT: 'Comentario de sugerencia de administrador'
        TWIG_SANDBOX_ADMIN_HINT_HELP: 'Cuando sandbox bloquea una expresión, añade un comentario HTML de una línea a la página renderizada para que los superadministradores que ven el código fuente vean que algo fue filtrado. Los visitantes y no administradores no ven nada.'
        TWIG_SANDBOX_ALLOWED_FILTERS: 'Filtros permitidos'
        TWIG_SANDBOX_ALLOWED_FILTERS_HELP: 'Filtros de Twig que el contenido de la página puede aplicar.'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS: 'Funciones permitidas'
        TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP: 'Funciones de Twig que el contenido de la página puede llamar.'
        TWIG_SANDBOX_ALLOWED_METHODS: 'Métodos permitidos'
        TWIG_SANDBOX_ALLOWED_METHODS_HELP: 'Listas de métodos de objetos por clase que el contenido de la página puede invocar.'
        TWIG_SANDBOX_ALLOWED_PROPERTIES: 'Propiedades permitidas'
        TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP: 'Listas de propiedades de objetos por clase que el contenido de la página puede leer.'
        TWIG_SANDBOX_ALLOWED_TAGS: 'Etiquetas permitidas'
        TWIG_SANDBOX_ALLOWED_TAGS_HELP: 'Etiquetas de Twig que el contenido de la página puede usar. Añade solo etiquetas cuyos efectos quieras exponer a los autores.'
        TWIG_SANDBOX_CLASS: Clase
        TWIG_SANDBOX_ENABLED: 'Habilitar sandbox de Twig'
        TWIG_SANDBOX_ENABLED_HELP: 'Renderiza contenido de página creado por editores dentro de una SecurityPolicy de Twig basada en lista de permitidos. <strong>Deshabilitarlo elimina la única protección contra ataques de inyección de plantillas a través del contenido de la página</strong>: cualquier cuenta con acceso de nivel editor (o cualquiera que comprometa el sistema de archivos) puede ejecutar PHP arbitrario a través de Twig. Solo desactívalo si un sitio realmente necesita acceso de contenedor desde contenido de página y confías completamente en todos los autores.'
        TWIG_SANDBOX_HELP: 'Lista de permitidos de etiquetas, filtros, funciones, métodos y propiedades de Twig que las plantillas de contenido de página pueden usar. El contenido creado por editores se renderiza a través de este sandbox para que un autor comprometido o un error de inyección de plantillas no pueda acceder al contenedor más amplio.'
        TWIG_SANDBOX_LOGGING: 'Registrar violaciones'
        TWIG_SANDBOX_LOGGING_HELP: 'Escribir cada expresión bloqueada en <code>logs/twig-sandbox.log</code>. Útil mientras se ajusta la lista de permitidos; desactívalo en producción para mantener los registros silenciosos.'
