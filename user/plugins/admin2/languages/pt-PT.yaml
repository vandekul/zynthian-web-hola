        TWIG_CONTENT_HELP: 'Controlos para Twig incorporado em conteúdo de página criado por editores. Os modelos de tema no disco não são afetados por estas definições; aplicam-se apenas a Twig que os autores colocam no corpo da página ou na seção frontal.'
