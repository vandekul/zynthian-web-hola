        TWIG_CONTENT_PROCESS_ENABLED_HELP: 'Permite que páginas com <code>process: twig: true</code> na sua seção frontal (e a ativação em todo o site <code>system.pages.frontmatter.process_twig</code>) realmente executem Twig. <strong>Desativado por padrão no Grav 2.0.</strong> Deixar isto desativado reduz a superfície de ataque por injeção de modelos, mas danifica qualquer página que necessite Twig no seu corpo.'
