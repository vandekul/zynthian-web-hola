title: Engine

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:                                          
        engineHeader:
          type: tab
          title: Engine Heading
          fields:
            header.id:
              type: text
              label: ID
            header.title:
              type: text
              label: Títol
            header.subtitle:
              type: text
              label: Subtítol
            header.description:
              type: text
              label: Short Description
            header.engines:
              type: checkbox
              label: Show Engines?
            header.tag:
              type: text
              label: Tag for Engines (only if show engines is true)        
            header.date:
                type: datetime
                label: Data
                default: today
            header.splash.bg_image_landscape:
                type : pagemediaselect
                preview_images: true
                label: Choose engine image
                accept:
                  - .png
                  - .jpg
            header.media_thumb:
              type: pagemediaselect
              preview_images: true
              label: Choose card-engine image
              accept:
                - .png
                - .jpg
            header.taxonomies:
                type: section
                title: PLUGIN_ADMIN.TAXONOMIES
                underline: true
                fields:
                  header.taxonomy:
                    type: taxonomy
                    label: PLUGIN_ADMIN.TAXONOMY
                    multiple: true
                    validate:
                      type: array
            header.media_order:
                title: Galeria
                type: pagemedia
                label: PLUGIN_ADMIN.PAGE_MEDIA
            content:
              type: markdown
              label: Content
        mediaSetings:
          type: tab
          title: Media Settings
          fields:
            header.audio:
              name: audio
              type: list
              style: vertical
              label: Audio references
              fields:
                .audioType:
                  type: elements
                  label: Local | Soundcloud
                  options:
                    local: Local
                    soundcloud: Soundcloud
                  default: local
                .audioFile:
                    type: filepicker
                    label: Select your Audio
                .audioLink:
                    type: text
                    label: URL of your Audio                    
                .audioLabel:
                    type: text
                    label: Description
            header.video:
              name: video
              type: list
              style: vertical
              label: Video references
              fields:
                .videoType:
                  type: elements
                  label: Youtube | Vimeo
                  options:
                    youtube: Youtube
                    vimeo: Vimeo
                  default: youtube
                .videoLink:
                    type: text
                    label: URL of your Video                    
                .videoLabel:
                    type: text
                    label: Description
            header.url:
              name: url
              type: list
              style: vertical
              label: URLs
              fields:
                .urlLink:
                    type: text
                    label: URL                   
                .urlLabel:
                    type: text
                    label: Description                    
                