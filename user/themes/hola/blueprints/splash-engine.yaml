title: Engine

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        holaSetings:
          type: tab
          title: Hola Settings
          fields:  
            audio:
              type: section
              title: Audio 
              underline: true
              fields:
                header.audio:
                  type: list
                  style: vertical
                  fields:
                    .type:
                      type: elements
                      label: Audio Type
                      size: small
                      default: local
                      options:
                        local: Local audio file
                        soundcloud: Soundcloud Link
                      fields:
                        .local:
                          type: element
                          fields:
                            .audioFile:
                              type: text
                              label: Audio File Name
                            .audioLabel:
                              type: text
                              label: Audio Label
                        .soundcloud:
                          type: element
                          fields:
                            .audioLink:
                              type: text
                              label: Audio Link
                            .soundcloudLabel:
                              type: text
                              label: Audio Label                              
            video:
              type: section
              title: Video               
              underline: true
              fields:
                header.video:
                  type: list
                  style: vertical
                  fields:
                    .type:
                      type: elements
                      label: Video Type
                      size: small
                      default: youtube
                      options:
                        youtube: Youtube Link
                        vimeo: Vimeo Link
                      fields:
                        youtube:
                          type: element
                          fields:
                            .youtubeLink:
                              type: text
                              label: Video Link
                            .youtubeLabel:
                              type: text
                              label: Video Label                            
                        vimeo:
                          type: element
                          fields:
                            .vimeoLink:
                              type: text
                              label: Video Link         
                            .vimeoLabel:
                              type: text
                              label: Video Label
            urls:
              type: section
              title: Links 
              underline: true
              fields:
                header.urls:
                  type: list
                  style: vertical
                  fields:
                    .urlLink:
                      type: text
                      label: Link         
                    .urlLabel:
                        type: text
                        label: Link Label  
                                               
        engineHeader:
          type: tab
          title: Engine Heading

          fields:
            header.id:
              type: text
              label: ID
            header.title:
              type: text
              label: Títol
            header.subtitle:
              type: text
              label: Subtítol
            header.description:
              type: text
              label: Short Description

            header.date:
                type: datetime
                label: Data
                default: today
            header.splash.bg_image_landscape:
                type : pagemediaselect
                preview_images: true
                label: Choose engine image
                accept:
                  - .png
                  - .jpg
            header.media_thumb:
              type: pagemediaselect
              preview_images: true
              label: Choose card-engine image
              accept:
                - .png
                - .jpg
            header.taxonomies:
                type: section
                title: PLUGIN_ADMIN.TAXONOMIES
                underline: true
                fields:
                  header.taxonomy:
                    type: taxonomy
                    label: PLUGIN_ADMIN.TAXONOMY
                    multiple: true
                    validate:
                      type: array
            header.media_order:
                title: Galeria
                type: pagemedia
                label: PLUGIN_ADMIN.PAGE_MEDIA
            content:
              type: markdown
              label: Content