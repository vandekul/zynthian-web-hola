extends@: default

form:
  fields:
    tabs:

      fields:
        holaSetings:
          type: tab
          title: Hola Settings

          fields:
            header.smallTitle:
                type: text
                label: Small Title
                description: Small Title, text up of title.
            usecase:
              type: section
              title: Use-case
              text: Include information for usecase
              underline: true
              fields:
                header.usecase:
                  type: list
                  label: Add information 
                  style: vertical
                  fields:
                    .icon:
                      type: iconpicker
                      label: Icon 
                    .subtitle:
                      type: text
                      label: Subtitle
                    .title:
                      type: text
                      label: Title
                    .description:
                      type: textarea
                      label: Description
                    .learnmoretext:
                      type: text
                      label: Learn More Text
                    .learnmorelink:
                      type: pages
                      label: Learn More Label
                    .audiourl:
                      type: filepicker
                      folder: '@self'
                      label: Select Music
                      accept:
                        - .ogg
                        - .mp3
                    .background:
                      type: filepicker
                      folder: '@self'
                      label: Select Picture Background
                      description: Best Experience With Dimensions - 3000x2000px.
                      preview_images: true
                      accept:
                        - .png
                        - .jpg
                    
            
            